<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UrbanThread - Pre-Order Kaos</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

header { text-align: center; padding: 40px 20px; }
header h1 { font-size: 32px; margin-bottom: 10px; }
.timer-box { background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 20px auto; max-width: 400px; text-align: center; }
.timer { font-size: 24px; font-weight: bold; color: #ff6b35; }

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin: 40px 0; }
.card { background: #1a1a1a; border-radius: 12px; overflow: hidden; padding: 15px; }

/* SLIDER CSS */
.img-wrap { position: relative; width: 100%; height: 350px; border-radius: 12px; overflow: hidden; }
.slider { position: relative; width: 100%; height: 100%; overflow: hidden; }
.slider img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  position: absolute;
  top: 0;
  left: 0;
  transition: opacity 0.5s;
}
.slider img.active { display: block; opacity: 1; }
.prev,.next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  font-size: 24px;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 50%;
  z-index: 2;
}
.prev { left: 10px; }
.next { right: 10px; }
.prev:hover,.next:hover { background: rgba(0,0,0,0.8); }
.dots {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  z-index: 2;
}
.dot {
  width: 8px;
  height: 8px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  cursor: pointer;
  transition: 0.3s;
}
.dot.active { background: white; width: 20px; border-radius: 4px; }

.card h3 { margin: 15px 0 10px; font-size: 18px; }
.card p { color: #aaa; margin-bottom: 15px; }
.btn { background: #ff6b35; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn:hover { background: #ff5722; }

footer { background: #0a0a0a; padding: 40px 20px; margin-top: 60px; text-align: center; color: #666; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>UrbanThread</h1>
    <p>Pre-Order Limited Edition</p>
    <div class="timer-box">
      <div>Pre-Order Ditutup Dalam:</div>
      <div class="timer" id="timer">00:00:00:00</div>
    </div>
  </header>

  <div class="grid">
    <!-- PRODUK 1 -->
    <div class="card" data-nama="Kaos Oversize Urban Black" data-harga="149000" data-type="preorder">
      <div class="img-wrap">
        <div class="slider">
          <img src="https://images.unsplash.com/photo-1581655353564-df123a1eb820?w=500&auto=format&fit=crop" alt="Urban Black 1">
          <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500&auto=format&fit=crop" alt="Urban Black 2">
          <img src="https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?w=500&auto=format&fit=crop" alt="Urban Black 3">
          <button class="prev" onclick="slide(this,-1)">‹</button>
          <button class="next" onclick="slide(this,1)">›</button>
          <div class="dots"></div>
        </div>
      </div>
      <h3>Kaos Oversize Urban Black</h3>
      <p>Rp149.000</p>
      <button class="btn" onclick="addToCart(this)">Pre-Order Sekarang</button>
    </div>

    <!-- PRODUK 2 -->
    <div class="card" data-nama="Kaos Vintage Graphic" data-harga="129000" data-type="preorder">
      <div class="img-wrap">
        <div class="slider">
          <img src="https://images.unsplash.com/photo-1618354691792-d1d42acfd860?w=500&auto=format&fit=crop" alt="Vintage 1">
          <img src="https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=500&auto=format&fit=crop" alt="Vintage 2">
          <button class="prev" onclick="slide(this,-1)">‹</button>
          <button class="next" onclick="slide(this,1)">›</button>
          <div class="dots"></div>
        </div>
      </div>
      <h3>Kaos Vintage Graphic</h3>
      <p>Rp129.000</p>
      <button class="btn" onclick="addToCart(this)">Pre-Order Sekarang</button>
    </div>

    <!-- PRODUK 3 -->
    <div class="card" data-nama="Kaos Street Basic" data-harga="99000" data-type="ready">
      <div class="img-wrap">
        <div class="slider">
          <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=500&auto=format&fit=crop" alt="Street 1">
          <img src="https://images.unsplash.com/photo-1576566588028-4147f3842f27?w=500&auto=format&fit=crop" alt="Street 2">
          <button class="prev" onclick="slide(this,-1)">‹</button>
          <button class="next" onclick="slide(this,1)">›</button>
          <div class="dots"></div>
        </div>
      </div>
      <h3>Kaos Street Basic</h3>
      <p>Rp99.000</p>
      <button class="btn" onclick="addToCart(this)">Beli Sekarang</button>
    </div>
  </div>
</div>

<footer>
  <p>© 2026 UrbanThread. All rights reserved.</p>
</footer>

<script>
const cart = [];

// SLIDER JS
function initSliders() {
  document.querySelectorAll('.slider').forEach(slider => {
    const imgs = slider.querySelectorAll('img');
    const dotsBox = slider.querySelector('.dots');
    slider.dataset.current = 0;
    imgs[0].classList.add('active');

    imgs.forEach((img, i) => {
      const dot = document.createElement('span');
      dot.classList.add('dot');
      if(i === 0) dot.classList.add('active');
      dot.onclick = () => showSlide(slider, i);
      dotsBox.appendChild(dot);
    });
  });
}

function showSlide(slider, index) {
  const imgs = slider.querySelectorAll('img');
  const dots = slider.querySelectorAll('.dot');
  imgs.forEach(img => img.classList.remove('active'));
  dots.forEach(dot => dot.classList.remove('active'));
  imgs[index].classList.add('active');
  dots[index].classList.add('active');
  slider.dataset.current = index;
}

function slide(btn, dir) {
  const slider = btn.parentElement;
  const imgs = slider.querySelectorAll('img');
  let current = parseInt(slider.dataset.current || 0);
  current = (current + dir + imgs.length) % imgs.length;
  showSlide(slider, current);
}

// AUTO SLIDE 3 DETIK
setInterval(() => {
  document.querySelectorAll('.slider').forEach(slider => {
    const imgs = slider.querySelectorAll('img');
    if(imgs.length <= 1) return;
    let current = parseInt(slider.dataset.current || 0);
    current = (current + 1) % imgs.length;
    showSlide(slider, current);
  });
}, 3000);

document.addEventListener('DOMContentLoaded', initSliders);

// Fungsi cart & timer kamu tetap di sini
function addToCart(btn) {
  const card = btn.closest('.card');
  alert(card.dataset.nama + ' ditambah ke keranjang');
}

// Timer contoh 2 hari
function updateTimer() {
  const end = new Date().getTime() + 2*24*60*60*1000;
  setInterval(() => {
    const now = new Date().getTime();
    const dist = end - now;
    const d = Math.floor(dist / 86400000);
    const h = Math.floor(dist % 86400000 / 3600000);
    const m = Math.floor(dist % 3600000 / 60000);
    const s = Math.floor(dist % 60000 / 1000);
    document.getElementById('timer').innerText = `${d}h ${h}j ${m}m ${s}d`;
  }, 1000);
}
updateTimer();
</script>
</body>
</html>
