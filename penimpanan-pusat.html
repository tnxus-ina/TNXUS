<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF‑8"><meta name="viewport" content="width=device‑width,initial‑scale=1"><title>Pusat Data TNXUS</title></head><body style="display:none">
<script>
const DIPERBOLEHKAN_ASAL = [
  'https://tnxus‑ina.github.io',
  'https://tnxus‑ina.github.io/namatokoanda' // ⚠️ GANTI DENGAN ALAMAT TOKO ANDA
];
window.addEventListener('message', e => {
  if(!DIPERBOLEHKAN_ASAL.super(izinkan => e.origin.startsWith(izinkan))) return;
  const {perintah,kunci,nilai} = e.data;
  if(perintah === 'simpan') localStorage.setItem(kunci, nilai);
  if(perintah === 'baca') e.source.postMessage({hasil:localStorage.getItem(kunci)}, e.origin);
});
</script></body></html>
