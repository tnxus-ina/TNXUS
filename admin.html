<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — TNXUS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gelap: '#0a0a0f',
            kartu: '#111118',
            utama: '#00d4ff',
            sekunder: '#ff00ff',
            sukses: '#22c55e',
            peringatan: '#f59e0b',
            bahaya: '#ef4444',
            teks: '#f5f5f7',
            redup: '#a1a1b3'
          },
          fontFamily: { inter: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto { content-visibility: auto; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gelap text-teks font-inter min-h-screen">

  <!-- HALAMAN MASUK -->
  <div id="halamanMasuk" class="fixed inset-0 z-50 flex items-center justify-center bg-gelap/95 backdrop-blur-md">
    <div class="bg-kartu p-8 rounded-2xl border border-utama/20 w-[90%] max-w-md shadow-xl">
      <div class="text-center mb-6">
        <h1 class="text-[clamp(1.8rem,3vw,2.2rem)] font-extrabold bg-gradient-to-r from-utama ke-sekunder bg-clip-text text-transparent">TNXUS ADMIN</h1>
        <p class="text-redup mt-2">Masuk ke sistem pengelolaan pesanan</p>
      </div>
      <div class="mb-4">
        <label class="block text-sm text-redup mb-2">Kata Sandi Akses</label>
        <input type="password" id="katasandi" class="w-full px-4 py-3 rounded-lg bg-gelap border border-putih/10 focus:border-utama outline-none transition-all" placeholder="Masukkan kata sandi...">
      </div>
      <button onclick="cekSandi()" class="w-full py-3 rounded-lg bg-gradient-to-r from-sekunder ke-utama font-semibold hover:opacity-90 transition-opacity">Masuk Panel</button>
      <p class="text-xs text-redup mt-4 text-center">Kata sandi bawaan: <code class="bg-gelap px-2 py-1 rounded">tnxus2026</code> — silakan ubah di kode sumber</p>
    </div>
  </div>

  <!-- ISI UTAMA -->
  <div id="isiAdmin" class="hidden">
    <header class="sticky top-0 z-40 bg-gelap/80 backdrop-blur-md border-b border-putih/5 px-4 md:px-8 py-4 flex justify-between items-center">
      <div>
        <h1 class="text-xl font-bold bg-gradient-to-r from-utama ke-sekunder bg-clip-text text-transparent">PANEL ADMIN TNXUS</h1>
        <p class="text-xs text-redup">Sistem terhubung dengan halaman toko</p>
      </div>
      <div class="flex gap-3 items-center">
        <span id="jumlahPesananBaru" class="bg-bahaya/90 text-white text-xs font-semibold px-2 py-0.5 rounded-full">0</span>
        <button onclick="keluarAkun()" class="text-redup hover:text-bahaya transition-colors"><i class="fa fa-sign-out mr-1"></i>Keluar</button>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-6">
      <!-- KOTAK PENCARIAN -->
      <div class="mb-6 flex flex-col md:flex-row gap-3 justify-between items-start md:items-center">
        <div class="relative w-full md:w-1/2">
          <input type="text" id="cariPesanan" placeholder="Cari berdasarkan nomor faktur / nama pembeli..." class="w-full pl-10 pr-4 py-3 rounded-xl bg-kartu border border-putih/10 focus:border-utama/40 outline-none">
          <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-redup"></i>
        </div>
        <div class="flex gap-2">
          <button onclick="segarkanData()" class="px-4 py-2.5 rounded-lg bg-kartu border border-putih/10 hover:border-utama/40 transition-colors"><i class="fa fa-refresh mr-1"></i>Segarkan</button>
          <button onclick="simpanCadangan()" class="px-4 py-2.5 rounded-lg bg-sukses/10 text-sukses hover:bg-sukses/20 transition-colors"><i class="fa fa-download mr-1"></i>Ekspor Data</button>
        </div>
      </div>

      <!-- DAFTAR PESANAN -->
      <section class="mb-12">
        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><i class="fa fa-shopping-bag text-utama"></i> Daftar Seluruh Pesanan</h2>
        <div id="daftarPesanan" class="space-y-4">
          <div class="text-center py-12 text-redup">
            <i class="fa fa-spinner fa-spin text-2xl mb-2"></i>
            <p>Sedang memuat data pesanan...</p>
          </div>
        </div>
      </section>

      <!-- PESANAN LAYANAN PELANGGAN -->
      <section>
        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><i class="fa fa-comments text-sekunder"></i> Pesan Terenkripsi Pelanggan</h2>
        <div id="kotakPesan" class="bg-kartu border border-putih/10 rounded-xl p-5 min-h-[200px]">
          <p class="text-center text-redup">Belum ada pesan masuk</p>
        </div>
      </section>
    </main>
  </div>

  <script>
    // ⚙️ PENGATURAN SISTEM — UBAH SESUAI KEBUTUHAN ANDA
    const KATA_SANDI_ADMIN = 'tnxus2026'; // GANTI DENGAN KATA SANDI ANDA SENDIRI
    const KUNCI_ENKRIPSI = 'TNXUS-RAHASIA-2026-KUNCI-PESANAN'; // Kunci sandi pesan rahasia

    // --- HALAMAN MASUK ---
    function cekSandi(){
      const input = document.getElementById('katasandi').value.trim();
      if(input === KATA_SANDI_ADMIN){
        document.getElementById('halamanMasuk').classList.add('hidden');
        document.getElementById('isiAdmin').classList.remove('hidden');
        muatDataPesanan();
      }else{
        alert('❌ Kata sandi salah! Coba lagi.');
      }
    }
    function keluarAkun(){
      document.getElementById('isiAdmin').classList.add('hidden');
      document.getElementById('halamanMasuk').classList.remove('hidden');
      document.getElementById('katasandi').value = '';
    }

    // --- PENYIMPANAN & PEMUATAN DATA ---
    function ambilSemuaPesanan(){
      return JSON.parse(localStorage.getItem('tnxus_daftar_pesanan') || '[]');
    }
    function simpanPerubahanPesanan(data){
      localStorage.setItem('tnxus_daftar_pesanan', JSON.stringify(data));
    }

    // --- SINKRONISASI DENGAN HALAMAN UTAMA ---
    // ⚠️ Penambahan kecil: Halaman depan akan mengirim data ke sini saat pemesanan
    window.addEventListener('storage', (e) => {
      if(e.key === 'tnxus_daftar_pesanan') muatDataPesanan();
    });

    function muatDataPesanan(){
      const daftar = ambilSemuaPesanan();
      const wadah = document.getElementById('daftarPesanan');
      const hitungBaru = daftar.filter(p => p.status === 'Baru Masuk').length;
      document.getElementById('jumlahPesananBaru').innerText = hitungBaru;

      if(!daftar.length){
        wadah.innerHTML = `<div class="text-center py-12 text-redup"><i class="fa fa-inbox text-3xl mb-2"></i><p>Belum ada pesanan yang masuk</p></div>`;
        return;
      }

      wadah.innerHTML = '';
      daftar.sort((a,b) => new Date(b.waktu) - new Date(a.waktu)); // Urut dari yang terbaru
      daftar.forEach(pesanan => wadah.appendChild(buatKartuPesanan(pesanan)));
    }

    // --- BAGIAN TAMPILAN KARTU PESANAN ---
    function buatKartuPesanan(p){
      const el = document.createElement('div');
      el.className = 'bg-kartu border border-putih/10 rounded-xl p-5 hover:border-utama/25 transition-colors';
      el.innerHTML = `
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-3">
          <div>
            <span class="font-mono font-bold text-utama">${p.nomorFaktur}</span>
            <span class="text-xs text-redup ml-3">${p.waktuTransaksi}</span>
          </div>
          <span class="px-3 py-1 rounded-full text-xs font-semibold ${kelasStatus(p.status)}">${p.status}</span>
        </div>
        <div class="grid md:grid-cols-2 gap-4 mb-3 text-sm">
          <div>
            <p class="text-redup mb-1">Pembeli:</p>
            <p class="font-medium">${p.nama}</p>
            <p class="text-redup">HP: ${p.telepon}</p>
            <p class="text-redup">Alamat: ${p.alamat}</p>
          </div>
          <div>
            <p class="text-redup mb-1">Rincian Barang:</p>
            <ul class="space-y-1">${p.daftarBarang.map(b => `<li>• ${b.nama} — Ukur. ${b.ukuran} ×${b.jumlah} = Rp ${b.totalHarga.toLocaleString()}</li>`).join('')}</ul>
            <p class="font-bold text-utama mt-1">Total Bayar: Rp ${p.totalHarga.toLocaleString()}</p>
          </div>
        </div>
        <div class="flex flex-wrap gap-2 mt-2">
          <select onchange="ubahStatusPesanan('${p.nomorFaktur}', this.value)" class="text-sm bg-gelap border border-putih/10 rounded px-2 py-1.5">
            <option value="Baru Masuk" ${p.status==='Baru Masuk'?'selected':''}>🔴 Baru Masuk</option>
            <option value="Sedang Dikemas" ${p.status==='Sedang Dikemas'?'selected':''}>🟡 Sedang Dikemas</option>
            <option value="Dikirim" ${p.status==='Dikirim'?'selected':''}>🔵 Sedang Dikirim</option>
            <option value="Selesai" ${p.status==='Selesai'?'selected':''}>🟢 Selesai</option>
            <option value="Dibatalkan" ${p.status==='Dibatalkan'?'selected':''}>⚫ Dibatalkan</option>
          </select>
          <button onclick="hubungiPelanggan('${p.telepon}','${p.nomorFaktur}')" class="text-sm bg-sukses/10 text-sukses px-2 py-1.5 rounded hover:bg-sukses/20"><i class="fa fa-whatsapp mr-1"></i> Hubungi</button>
          <button onclick="hapusPesanan('${p.nomorFaktur}')" class="text-sm bg-bahaya/10 text-bahaya px-2 py-1.5 rounded hover:bg-bahaya/20"><i class="fa fa-trash mr-1"></i> Hapus</button>
        </div>
      `;
      return el;
    }

    function kelasStatus(s){
      const peta = {
        'Baru Masuk': 'bg-bahaya/15 text-bahaya',
        'Sedang Dikemas': 'bg-peringatan/15 text-peringatan',
        'Dikirim': 'bg-utama/15 text-utama',
        'Selesai': 'bg-sukses/15 text-sukses',
        'Dibatalkan': 'bg-redup/15 text-redup'
      };
      return peta[s] || 'bg-kartu/50 text-redup';
    }

    // --- FUNGSI PENGELOLAAN ---
    function ubahStatusPesanan(faktur, statusBaru){
      const daftar = ambilSemuaPesanan();
      const data = daftar.find(i => i.nomorFaktur === faktur);
      if(data){
        data.status = statusBaru;
        simpanPerubahanPesanan(daftar);
        muatDataPesanan();
        alert(`✅ Status pesanan ${faktur} diubah menjadi: ${statusBaru}`);
      }
    }
    function hapusPesanan(faktur){
      if(confirm('⚠️ Yakin ingin menghapus catatan ini? Tindakan ini tidak dapat dibatalkan!')){
        const saring = ambilSemuaPesanan().filter(i => i.nomorFaktur !== faktur);
        simpanPerubahanPesanan(saring);
        muatDataPesanan();
      }
    }
    function hubungiPelanggan(nohp, faktur){
      const pesan = `Halo TNXUS Admin, terkait pesanan nomor: ${faktur}`;
      window.open(`https://wa.me/62${nohp.slice(1)}?text=${encodeURIComponent(pesan)}`, '_blank');
    }
    function segarkanData(){ muatDataPesanan(); alert('✅ Data diperbarui'); }
    function simpanCadangan(){
      const data = JSON.stringify(ambilSemuaPesanan(), null, 2);
      const berkas = document.createElement('a');
      berkas.href = URL.createObjectURL(new Blob([data], {type:'application/json'}));
      berkas.download = `cadangan-pesanan-tnxus-${new Date().toISOString().slice(0,10)}.json`;
      berkas.click();
    }

    // --- SISTEM PENCARIAN ---
    document.getElementById('cariPesanan').addEventListener('input', e => {
      const kata = e.target.value.toLowerCase().trim();
      document.querySelectorAll('#daftarPesanan > div').forEach(kartu => {
        kartu.style.display = kartu.textContent.toLowerCase().includes(kata) ? 'block' : 'none';
      });
    });

    // --- SISTEM ENKRIPSI PESANAN SEDERHANA ---
    function enkripsiPesan(teks){
      let hasil = '';
      for(let i=0; i<teks.length; i++) hasil += String.fromCharCode(teks.charCodeAt(i) ^ KUNCI_ENKRIPSI.charCodeAt(i % KUNCI_ENKRIPSI.length));
      return btoa(hasil);
    }
    function dekripsiPesan(kode){
      try{
        const baca = atob(kode);
        let hasil = '';
        for(let i=0; i<baca.length; i++) hasil += String.fromCharCode(baca.charCodeAt(i) ^ KUNCI_ENKRIPSI.charCodeAt(i % KUNCI_ENKRIPSI.length));
        return hasil;
      }catch{ return '⚠️ Pesan rusak atau tidak dapat dibaca'; }
    }

    // --- PEMERIKSAAN PESANAN BARU ---
    function muatPesan(){
      const wadah = document.getElementById('kotakPesan');
      const daftar = JSON.parse(localStorage.getItem('tnxus_pesan_rahasia') || '[]');
      if(!daftar.length){ wadah.innerHTML = `<p class="text-center text-redup">Belum ada pesan masuk</p>`; return; }
      wadah.innerHTML = '';
      daftar.forEach(p => {
        const kotak = document.createElement('div');
        kotak.className = 'bg-gelap/40 p-3 rounded-lg mb-2 border border-sekunder/10';
        kotak.innerHTML = `<div class="flex justify-between text-xs text-redup mb-1"><span>${p.pengirim || 'Tidak diketahui'}</span><span>${p.waktu}</span></div><p>${dekripsiPesan(p.isiPesan)}</p>`;
        wadah.appendChild(kotak);
      });
    }
    setInterval(muatPesan, 3000); // Periksa pesan baru setiap 3 detik
  </script>
</body>
</html>
